# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  creationTimestamp: null
  name: minimal-linodecluster
  # Label to trigger the test on every PR
  labels:
    all:
    quick:
    linodecluster:
spec:
  bindings:
    # A short identifier for the E2E test run
    - name: run
      value: (join('-', ['e2e', 'min-cluster', random('[0-9a-z]{5}')]))
    - name: cluster
      # Format the cluster name
      value: (trim((truncate(($run), `29`)), '-'))
    - name: nodebalancer
      value: ($cluster)
  template: true
  steps:
    - name: Check if CAPI provider resources exist
      try:
        - assert:
            file: assert-capi-resources.yaml
    - name: Create Cluster resource
      try:
        - apply:
            file: create-cluster.yaml
      catch:
        - describe:
            apiVersion: cluster.x-k8s.io/v1beta2
            kind: Cluster
    - name: Create LinodeCluster resource
      try:
        - apply:
            file: create-linodecluster.yaml
        - assert:
            file: assert-linodecluster.yaml
      catch:
        - describe:
            apiVersion: infrastructure.cluster.x-k8s.io/v1alpha2
            kind: LinodeCluster
    - name: Check if the nodebalancer exists
      try:
        - script:
            env:
              - name: TARGET_API
                value: api.linode.com
              - name: TARGET_API_VERSION
                value: v4beta
              - name: URI
                value: nodebalancers
              - name: FILTER
                value: (to_string({"label":($nodebalancer)}))
            content: |
              set -e
              MAX_RETRIES=12
              RETRY_DELAY=5
              ATTEMPT=1

              while true; do
                RESPONSE=$(curl -s \
                  -H "Authorization: Bearer $LINODE_TOKEN" \
                  -H "X-Filter: $FILTER" \
                  -H "Content-Type: application/json" \
                  "https://$TARGET_API/$TARGET_API_VERSION/$URI")

                if echo "$RESPONSE" | jq -e '.results == 1' >/dev/null; then
                  break
                fi

                if [ "$ATTEMPT" -ge "$MAX_RETRIES" ]; then
                  echo "$RESPONSE"
                  exit 1
                fi

                ATTEMPT=$((ATTEMPT + 1))
                sleep "$RETRY_DELAY"
              done
            check:
              ($error): ~
    - name: Delete Cluster resource
      try:
        - delete:
            ref:
              apiVersion: cluster.x-k8s.io/v1beta2
              kind: Cluster
              name: ($cluster)
        - error:
            file: check-linodecluster-deleted.yaml
    - name: Check if the nodebalancer is deleted
      try:
        - script:
            env:
              - name: TARGET_API
                value: api.linode.com
              - name: TARGET_API_VERSION
                value: v4beta
              - name: URI
                value: nodebalancers
              - name: FILTER
                value: (to_string({"label":($nodebalancer)}))
            content: |
              set -e
              MAX_RETRIES=12
              RETRY_DELAY=5
              ATTEMPT=1

              while true; do
                RESPONSE=$(curl -s \
                  -H "Authorization: Bearer $LINODE_TOKEN" \
                  -H "X-Filter: $FILTER" \
                  -H "Content-Type: application/json" \
                  "https://$TARGET_API/$TARGET_API_VERSION/$URI")

                if echo "$RESPONSE" | jq -e '.results == 0' >/dev/null; then
                  break
                fi

                if [ "$ATTEMPT" -ge "$MAX_RETRIES" ]; then
                  echo "$RESPONSE"
                  exit 1
                fi

                ATTEMPT=$((ATTEMPT + 1))
                sleep "$RETRY_DELAY"
              done
            check:
              ($error): ~

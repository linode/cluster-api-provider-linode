apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../vpcless

patches:
  - target:
      group: infrastructure.cluster.x-k8s.io
      version: v1alpha2
      kind: LinodeCluster
    patch: |-
      apiVersion: infrastructure.cluster.x-k8s.io/v1alpha2
      kind: LinodeCluster
      metadata:
        name: ${CLUSTER_NAME}
      spec:
        nodeBalancerFirewallRef: null
  - target:
      group: cluster.x-k8s.io
      version: v1beta2
      kind: Cluster
    patch: |-
      apiVersion: cluster.x-k8s.io/v1beta2
      kind: Cluster
      metadata:
        name: ${CLUSTER_NAME}
      spec:
        clusterNetwork:
          pods:
            cidrBlocks:
              - 10.192.0.0/10
              - fd02::/80
          services:
            cidrBlocks:
              - 10.96.0.0/12
              - fd03::/108
  - target:
      group: controlplane.cluster.x-k8s.io
      version: v1beta2
      kind: KubeadmControlPlane
    patch: |-
      apiVersion: controlplane.cluster.x-k8s.io/v1beta2
      kind: KubeadmControlPlane
      metadata:
        name: ${CLUSTER_NAME}-cp
      spec:
        kubeadmConfigSpec:
          clusterConfiguration:
            controllerManager:
              extraArgs:
                - name: "node-cidr-mask-size-ipv6"
                  value: "96"
  - target:
      kind: HelmChartProxy
      name: .*-cilium
    patch: |-
      - op: replace
        path: /spec/valuesTemplate
        value: |
          bgpControlPlane:
            enabled: true
          routingMode: native
          devices:
            - eth0
            - eth1
          nodePort:
            addresses:
              - 0.0.0.0/0
              - ::/0
            directRoutingDevice: eth0
          kubeProxyReplacement: true
          ipv4NativeRoutingCIDR: 0.0.0.0/0
          ipv6NativeRoutingCIDR: ::/0
          tunnelProtocol: ""
          enableIPv4Masquerade: true
          enableIPv6Masquerade: false
          policyAuditMode: ${FW_AUDIT_ONLY:=true}
          hostFirewall:
            enabled: true
          extraConfig:
            allow-localhost: policy
          k8sServiceHost: {{ .InfraCluster.spec.controlPlaneEndpoint.host }}
          k8sServicePort: {{ .InfraCluster.spec.controlPlaneEndpoint.port }}
          ipam:
            mode: kubernetes
          ipv4:
            enabled: true
          ipv6:
            enabled: true
          k8s:
            requireIPv4PodCIDR: true
            requireIPv6PodCIDR: true
          hubble:
            relay:
              enabled: true
            ui:
              enabled: true

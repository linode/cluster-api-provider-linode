name: Run e2e tests

on:
  workflow_call:
    inputs:
      e2e-selector:
        default: quick
        description: "Selector for which tests to run, defaults to 'quick'"
        required: true
        type: string
      e2e-flags:
        type: string
        description: "Flags to pass to chainsaw when running e2e tests"
      environment:
        required: false
        type: string
        default: ''
  workflow_dispatch:
    inputs:
      e2e-selector:
        default: quick
        description: "Selector for which tests to run, defaults to 'quick'"
        type: choice
        required: true
        options:
          - quick
          - cluster-pause
          - flavors
          - k3s
          - rke2
          - default-cluster
          - kubeadm-full
          - linodecluster
          - linodemachine
          - linodeobj
          - linodevpc
          - linodeplacementgroup
          - linodefirewall
          - all
      e2e-flags:
        type: string
        description: "Flags to pass to chainsaw when running e2e tests"

permissions:
  contents: read
  pull-requests: read
  actions: read

concurrency:
  group: e2e-${{ inputs.e2e-selector }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      # Expose matched filters as job 'src' output variable
      paths: ${{ steps.filter.outputs.changes }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: .github/filters.yml
  e2e-test:
    needs: changes
    name: ${{ format('{0}-e2e-tests', inputs.e2e-selector) }}
    if: ${{contains(fromJSON(needs.changes.outputs.paths), 'src')}}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      GITHUB_TOKEN: ${{ secrets.github_token }}
      LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: block
          allowed-endpoints: >
            *:6443
            api.linode.com:443
            api.github.com:443
            github.com:443
            gcr.io:443
            ghcr.io:443
            golang.org:443
            proxy.golang.org:443
            sum.golang.org:443
            *.githubusercontent.com:443
            docker.io:443
            registry-1.docker.io:443
            auth.docker.io:443
            production.cloudflare.docker.com:443
            storage.googleapis.com:443
            registry.k8s.io:443
            *.pkg.dev:443
            *.amazonaws.com:443
            *.blob.core.windows.net:443
            quay.io:443
            *.quay.io:443
            api.snapcraft.io:443
            cloud.tilt.dev:443
            kubernetes-sigs.github.io:443
            charts.jetstack.io:443
            helm.cilium.io:443
            linode.github.io:443
            *.linodeobjects.com:443
            dl.k8s.io:443
            cdn.dl.k8s.io:443
            get.jetify.com:443
            get.jetpack.io:443
            releases.jetify.com:443
            releases.jetpack.io:443
            artifacts.nixos.org:443
            cache.nixos.org:443

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
          check-latest: true

      - name: Docker cache
        uses: ScribeMD/docker-cache@fb28c93772363301b8d0a6072ce850224b73f74e # 0.5.0
        with:
          key: docker-${{ runner.os }}-${{ hashFiles('go.sum') }}

      - name: Install devbox
        uses: jetify-com/devbox-install-action@8c6a66ed6273138b1915457069de78cb52fe3bd7 # v0.15.0
        with:
          enable-cache: 'true'
          refresh-cli: 'false'

      - name: Create IPv4-only kind network
        run: |
          docker network inspect kind >/dev/null 2>&1 || \
          docker network create -d=bridge \
            -o com.docker.network.bridge.enable_ip_masquerade=true \
            -o com.docker.network.driver.mtu=1500 \
            kind

      - name: Run E2E Test
        env:
          E2E_FLAGS: ${{ inputs.e2e-flags }}
          E2E_SELECTOR: ${{ inputs.e2e-selector }}
          INSTALL_K3S_PROVIDER: true
          INSTALL_RKE2_PROVIDER: true
          LINODE_REGION: us-sea
          LINODE_CONTROL_PLANE_MACHINE_TYPE: g6-standard-2
          LINODE_MACHINE_TYPE: g6-standard-2
          CLUSTERCTL_CONFIG: /home/runner/work/cluster-api-provider-linode/cluster-api-provider-linode/e2e/gha-clusterctl-config.yaml
          LINODE_CLIENT_TIMEOUT: 30
        run: devbox run make e2etest

      - name: cleanup stale clusters
        if: ${{ always() }}
        run: make clean-child-clusters

      - name: Copy logs
        if: ${{ always() }}
        run: docker cp tilt-control-plane:/var/log .logs

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ always() }}
        with:
          name: ${{ inputs.e2e-selector }}-logs
          path: .logs/*
          overwrite: true
